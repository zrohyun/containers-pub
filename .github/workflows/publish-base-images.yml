name: publish-base-images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-base-images.yml
      - docker/ubuntu-apt-brew/Dockerfile

permissions:
  contents: read
  packages: write

jobs:
  publish-ubuntu-apt-brew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "date_tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu-apt-brew/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/base-ubuntu-apt-brew:24.04
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/base-ubuntu-apt-brew:24.04-${{ steps.meta.outputs.date_tag }}
